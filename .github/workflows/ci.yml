name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm test
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo run --manifest-path consumers/minimal-game/Cargo.toml
