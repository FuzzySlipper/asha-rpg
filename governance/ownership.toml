# Source and owner-local tests activate a cell together.

[crate."crates/rpg-core"]
lane = "rust-domain"
implementation_status = "active"
may_depend_on = []

[crate."crates/rpg-ir"]
lane = "rust-language"
implementation_status = "active"
may_depend_on = ["rpg-core", "serde"]
owns = ["normalized RPG IR", "closed ruleset artifact wire contract"]

[crate."crates/rpg-compiler"]
lane = "rust-language"
implementation_status = "active"
may_depend_on = ["rpg-core", "rpg-ir", "serde", "serde_json"]
owns = ["semantic compilation", "private compiled plans", "ruleset artifact validation and fingerprints"]

[crate."crates/rpg-runtime"]
lane = "rust-authority"
implementation_status = "active"
may_depend_on = ["rpg-core", "rpg-compiler"]

[crate."crates/rpg-replay"]
lane = "rust-authority"
implementation_status = "planned"
may_depend_on = ["rpg-core", "rpg-ir", "rpg-runtime"]

[crate."crates/asha-rpg"]
lane = "rust-api"
implementation_status = "active"
may_depend_on = ["rpg-core", "rpg-ir", "rpg-compiler", "rpg-runtime", "rpg-replay"]

[package."packages/ir"]
name = "@asha-rpg/ir"
lane = "ts-authoring"
type = "lib"
layer = "protocol"
implementation_status = "active"
may_depend_on = []

[package."packages/authoring"]
name = "@asha-rpg/authoring"
lane = "ts-authoring"
type = "lib"
layer = "domain"
implementation_status = "active"
may_depend_on = ["@asha-rpg/ir"]
owns = ["immutable authoring AST", "explicit package composition and resolution", "deterministic materialization into prepared rulesets"]
