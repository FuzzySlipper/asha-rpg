# Planned cells become active only when source and owner-local tests move together.

[crate."crates/rpg-core"]
lane = "rust-domain"
implementation_status = "planned"
may_depend_on = []

[crate."crates/rpg-ir"]
lane = "rust-language"
implementation_status = "planned"
may_depend_on = ["rpg-core", "serde"]

[crate."crates/rpg-compiler"]
lane = "rust-language"
implementation_status = "planned"
may_depend_on = ["rpg-core", "rpg-ir", "asha-gameplay-module-sdk"]

[crate."crates/rpg-runtime"]
lane = "rust-authority"
implementation_status = "planned"
may_depend_on = ["rpg-core", "rpg-ir", "rpg-compiler", "asha-runtime-session-composition"]

[crate."crates/rpg-replay"]
lane = "rust-authority"
implementation_status = "planned"
may_depend_on = ["rpg-core", "rpg-ir", "rpg-runtime"]

[crate."crates/asha-rpg"]
lane = "rust-api"
implementation_status = "planned"
may_depend_on = ["rpg-core", "rpg-ir", "rpg-compiler", "rpg-runtime", "rpg-replay"]

[package."packages/ir"]
name = "@asha-rpg/ir"
lane = "ts-authoring"
type = "lib"
layer = "protocol"
implementation_status = "planned"
may_depend_on = []

[package."packages/authoring"]
name = "@asha-rpg/authoring"
lane = "ts-authoring"
type = "lib"
layer = "domain"
implementation_status = "planned"
may_depend_on = ["@asha-rpg/ir"]
