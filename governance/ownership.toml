# Source and owner-local tests activate a cell together.

[crate."crates/rpg-core"]
lane = "rust-domain"
implementation_status = "active"
may_depend_on = ["serde"]
owns = ["authority values", "open team identities", "accepted DomainEvents", "stable portable state construction"]

[crate."crates/rpg-ir"]
lane = "rust-language"
implementation_status = "active"
may_depend_on = ["rpg-core", "serde"]
owns = ["normalized RPG IR", "closed ruleset artifact wire contract", "typed derivation and overlay provenance wire contracts"]

[crate."crates/rpg-compiler"]
lane = "rust-language"
implementation_status = "active"
may_depend_on = ["rpg-core", "rpg-ir", "serde", "serde_json"]
owns = ["semantic compilation", "private compiled plans", "ruleset artifact validation and fingerprints", "materialized definition fingerprint validation"]

[crate."crates/rpg-runtime"]
lane = "rust-authority"
implementation_status = "active"
may_depend_on = ["rpg-core", "rpg-ir", "rpg-compiler", "serde", "serde_json"]
owns = ["artifact-bound encounter setup validation", "single authority session", "turn and encounter readback authority", "host-supplied random evidence interface", "bounded roll-tape source", "portable checkpoint and replay contracts", "canonical session state hash", "pending reaction restore"]

[crate."crates/asha-rpg"]
lane = "rust-api"
implementation_status = "active"
may_depend_on = ["rpg-core", "rpg-ir", "rpg-compiler", "rpg-runtime"]

[package."packages/ir"]
name = "@asha-rpg/ir"
lane = "ts-authoring"
type = "lib"
layer = "protocol"
implementation_status = "active"
may_depend_on = []

[package."packages/authoring"]
name = "@asha-rpg/authoring"
lane = "ts-authoring"
type = "lib"
layer = "domain"
implementation_status = "active"
may_depend_on = ["@asha-rpg/ir"]
owns = ["immutable authoring AST", "explicit package composition and resolution", "deterministic base, mixin, overlay, and configuration materialization into prepared rulesets"]
